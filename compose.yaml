services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend:Z
      - ./data:/app/data:Z
      - ./.env:/app/.env:Z
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/tam_copilot.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app/backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src:Z
      - ./frontend/index.html:/app/index.html:Z
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
