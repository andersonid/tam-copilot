apiVersion: apps/v1
kind: Deployment
metadata:
  name: tam-copilot
  namespace: tam-copilot
  labels:
    app: tam-copilot
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tam-copilot
  template:
    metadata:
      labels:
        app: tam-copilot
    spec:
      containers:
        - name: tam-copilot
          image: registry.registry.svc.cluster.local:5000/nobre-ninja/tam-copilot:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: tam-copilot-env
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tam-copilot-data
